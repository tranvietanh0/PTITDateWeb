services:
  mysql:
    image: mysql:8.4
    container_name: ptitdate-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ptitdate
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: ptitdate-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  mysql-data:
  redis-data:
